services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: lucy
      POSTGRES_PASSWORD: lucy
      POSTGRES_DB: lucy
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lucy"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    env_file:
      - .env.docker
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
