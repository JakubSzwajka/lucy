services:
  gateway:
    build:
      context: .
      target: deps
    command: sh -c "npm run build && npx -y concurrently -n bridge,gateway -c blue,green 'npx tsx src/runtime/core/src/pi-bridge/index.ts' 'npx -y nodemon --legacy-watch --watch src/gateway --ext ts,json --exec npx\\ tsx\\ src/gateway/core/src/index.ts'"
    ports:
      - "${PORT:-3080}:${PORT:-3080}"
    environment:
      - NODE_ENV=development
      - PORT=${PORT:-3080}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - PI_BRIDGE_MODEL=${PI_BRIDGE_MODEL}
      - PI_BRIDGE_PROVIDER=${PI_BRIDGE_PROVIDER:-}
      - PI_CODING_AGENT_DIR=/data/pi
      - LUCY_API_KEY=${LUCY_API_KEY:-}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_ALLOWED_CHAT_IDS=${TELEGRAM_ALLOWED_CHAT_IDS:-}
      - AGENTS_DATA_DIR=/data
      - CORS_ORIGIN=${CORS_ORIGIN:-*}
    volumes:
      - ./src:/app/src
      - ./docs:/app/docs
      - ./tsconfig.json:/app/tsconfig.json:ro
      - ./prompt.md:/app/prompt.md
      - ./.data:/data
