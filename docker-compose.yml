services:
  gateway:
    build: .
    ports:
      - "${PORT:-3080}:${PORT:-3080}"
    environment:
      - PORT=${PORT:-3080}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - AGENTS_DATA_DIR=/data
      - CORS_ORIGIN=${CORS_ORIGIN:-*}
      - WHATSAPP_API_TOKEN=${WHATSAPP_API_TOKEN}
    volumes:
      - ~/.agents-data:/data
      - ./lucy.config.json:/app/lucy.config.json:ro
      - ./prompt.md:/app/prompt.md:ro

  webui:
    image: node:24-slim
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - "${WEBUI_PORT:-5173}:5173"
    environment:
      - VITE_API_URL=http://localhost:${PORT:-3080}
    volumes:
      - ./agents-webui:/app
      - webui-node-modules:/app/node_modules
    depends_on:
      - gateway

volumes:
  agents-data:
  webui-node-modules:
