name: dev-release

env:
  node-version: 18.19.0 # should be in line with .nvmrc

on:
  workflow_dispatch:
  push:
    branches:
      - main
jobs:
  run-migrations:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - name: Setup node
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.node-version }}
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
      - name: Run migrations
        run: npm run migrate
