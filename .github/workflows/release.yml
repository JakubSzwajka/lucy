name: Release

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

permissions:
  contents: write

jobs:
  tag:
    name: Create CalVer Tag
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate CalVer tag
        id: version
        run: |
          DATE_TAG="v$(date -u +'%Y.%m.%d')"
          # Check for existing tags with today's date and find the next suffix
          EXISTING=$(git tag -l "${DATE_TAG}*" | sort -V | tail -1)
          if [ -z "$EXISTING" ]; then
            VERSION="$DATE_TAG"
          elif [ "$EXISTING" = "$DATE_TAG" ]; then
            VERSION="${DATE_TAG}.1"
          else
            # Extract suffix number and increment
            SUFFIX=$(echo "$EXISTING" | sed "s/${DATE_TAG}\.//")
            NEXT=$((SUFFIX + 1))
            VERSION="${DATE_TAG}.${NEXT}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Tagging as $VERSION"

      - name: Create and push tag
        run: |
          git tag "${{ steps.version.outputs.version }}"
          git push origin "${{ steps.version.outputs.version }}"

  build-macos:
    name: Build macOS
    needs: [tag]
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js
        run: npx next build renderer

      - name: Prepare standalone
        run: |
          mkdir -p app/standalone
          cp -r renderer/.next/standalone/ app/standalone/
          mkdir -p app/standalone/renderer/.next
          cp -r renderer/.next/static app/standalone/renderer/.next/static
          if [ -d renderer/public ]; then cp -r renderer/public app/standalone/renderer/public; fi
          if [ -d drizzle ]; then cp -r drizzle app/standalone/drizzle; fi
          echo '{"name":"lucy-standalone","version":"1.0.0","main":"server.js"}' > app/standalone/package.json

      - name: Copy native modules
        run: |
          for mod in better-sqlite3 bindings file-uri-to-path prebuild-install; do
            if [ -d "node_modules/$mod" ]; then
              cp -r "node_modules/$mod" "app/standalone/node_modules/$mod"
            fi
          done

      - name: Compile main process
        run: npx tsc

      - name: Build Electron (macOS)
        run: npx electron-builder --config electron-builder.yml --mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-builds
          path: |
            dist/*.dmg
            dist/*.zip

  publish-release:
    name: Publish GitHub Release
    needs: [tag, build-macos]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.tag.outputs.version }}
          name: ${{ needs.tag.outputs.version }}
          generate_release_notes: true
          files: |
            artifacts/macos-builds/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
